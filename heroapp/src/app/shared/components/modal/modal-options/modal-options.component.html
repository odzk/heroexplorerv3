<div class="hx-modal-options-component">
  <button class="hx-btn-modal-close" mat-dialog-close>×</button>
  <h2 mat-dialog-title>{{data.title}}</h2>
  <mat-dialog-content>{{data.message}}</mat-dialog-content>
  <form [formGroup]="form" fxLayout="row wrap">
    <div fxFlex="100" fxFlex.xs="100" fxLayout="row" fxLayout.xs="column" fxLayoutAlign="center center" fxLayoutGap="10px">
      <ng-select class="modal-options" formControlName="selectedOption" [items]="data.options" bindLabel="text" bindValue="value" 
        [clearable]="false" [searchable]="false" placeholder="Select option">
      </ng-select>
    </div>
    <div fxFlex="100" fxFlex.xs="100" fxLayout="row" fxLayout.xs="column" fxLayoutAlign="center center" style="margin-bottom: 0.7rem">
      <mat-dialog-actions style="float:right; margin-top:10px">
        <button mat-button 
                style="border-radius: 26px;" 
                [ngClass]="{'disabled': form.invalid}" 
                class="hx-btn-primary" 
                (click)="close()">
          <a>Confirm</a>
        </button>
      </mat-dialog-actions>
    </div>
  </form>
</div>
