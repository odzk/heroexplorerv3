<div class="hx-modal-common-component">
  <button class="hx-btn-modal-close" mat-dialog-close>×</button>

  <form [formGroup]="form" fxLayout="row wrap">
    <div fxFlex="100">
      <h2> Edit travellers</h2>
    </div>


    <div fxFlex="100" class="box__name-input" fxFlex.xs="100">
      <div fxLayout="row" fxLayout.xs="column" fxLayoutGap="10px">
        <ng-select class="custom-ng-select-order-component" formControlName="title" fxFlex="20" fxFlex.xs="100" [items]="listTitle"
          [clearable]="false" [searchable]="false" bindLabel="value" bindValue="value" placeholder="Title">
        </ng-select>
        <input fxFlex="40" fxFlex.xs="100" formControlName="firstName" placeholder="First Name" />
        <input fxFlex="40" fxFlex.xs="100" formControlName="lastName" placeholder="Last Name" />

      </div>
    </div>
    <div fxFlex="100" fxFlex.xs="100" fxLayout="row" fxLayout.xs="column" fxLayoutAlign="center center " style="margin-top: 0.7rem">
      <button [ngClass]="{'disabled': form.invalid}" class="hx-btn-primary" (click)="close()">
        <a>Change</a>
      </button>
    </div>
  </form>
</div>
