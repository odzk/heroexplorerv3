<div class="hx-modal-common-component">
  <button class="hx-btn-modal-close" mat-dialog-close>×</button>

  <form [formGroup]="form" fxLayout="row wrap">
    <div fxFlex="100">
      <h3>{{title}}</h3>
    </div>

    <div *ngIf="option" fxFlex="100" fxFlex.xs="100" fxLayout="row" fxLayout.xs="column" fxLayoutAlign="start flex-start " style="margin-top: 0.7rem">
      <textarea maxlength="500"  formControlName="reason" required placeholder="{{option}}" ></textarea>     
    </div>

    <div fxFlex="100" fxFlex.xs="100" fxLayout="row" fxLayout.xs="column" fxLayoutAlign="flex-end flex-end " style="margin-top: 1.3rem">
      <button [ngClass]="{'disabled': form.invalid}"  type="button"  class="hx-btn-primary" (click)="request()">
        <a>Request</a>
      </button>
    </div>
  </form>
</div>
