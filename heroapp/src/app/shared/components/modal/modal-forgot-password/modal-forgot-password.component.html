<div class="hx-modal-forgot-component">
  <button class="hx-btn-modal-close" [mat-dialog-close]>×</button>

    <form [formGroup]="form" fxLayout="row wrap">
        <div fxFlex="100">
          <h2>Enter your email</h2>
        </div>
        <div fxFlex="100">
          <mat-form-field fxFlex="100">
            <input matInput placeholder="Email" formControlName="email" required>
            <app-control-message [control]="form.controls.email"></app-control-message>
          </mat-form-field>
        </div>
        <div fxFlex="100" fxLayout="" fxLayoutAlign="center " style="margin-top: 0.7rem">
          <button [ngClass]="{'disabled': form.invalid}" class="hx-btn-primary" (click)="close()">
            <a>Reset password</a>
          </button>
        </div>
      </form>

</div>
