<div class="hx-modal-confirm-component">
  <button class="hx-btn-modal-close" [mat-dialog-close]="false">×</button>
  <h2 mat-dialog-title>{{data.title}}</h2>
  <mat-dialog-content [innerHTML]="data.message"></mat-dialog-content>
  <mat-dialog-actions style="float:right; margin-top:10px">
    <button style="background: #dddddd; border-radius: 26px;" mat-button [mat-dialog-close]="false">No</button>
    <button style="background: #CC5757;border-radius: 26px;color:white" mat-button [mat-dialog-close]="true">Yes</button>
    </mat-dialog-actions>
</div>
