<div id="mc_embed_signup" style="display: hidden">
<h4>Subscribe for exclusive offers</h4>
<form (ngSubmit)="submit()">
    <label for="mce-EMAIL">Email Address <span class="asterisk">*</span>
    </label>
    <div id="mc_embed_signup_scroll" style="background-color: initial;">
    <input type="email" [formControl]="emailControl" class="email" id="mce-EMAIL" placeholder="" required="">
    </div>
    <div class="clear">
    <input type="submit" value="Subscribe" name="subscribe" id="mc-embedded-subscribe" class="button"
        style="margin-top: 11px;">
    </div>
</form>
</div>
