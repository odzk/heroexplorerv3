<div class="hx-login-component">
  <div class="login-content">
  <div class="header__background--full-screen">
    <slideshow [autoPlay]="true" [imageUrls]="pages | toHttps"></slideshow>
  </div>
</div>
  <div class="login-container">
   
    <div class="login-wrapper"
         fxFlex="50" fxFlex.xs="80"
        >
      <form [formGroup]="resetForm"
            fxLayout="row wrap">
        <div fxFlex="100">
          <h2>RESET YOUR PASSWORD</h2>
        </div>
        <div fxFlex="100">
          <mat-form-field>
            <input matInput
                   placeholder="Email"
                   formControlName="email"
                   required>
            <app-control-message [control]="resetForm.controls.email"></app-control-message>
          </mat-form-field>
        </div>
        <div fxFlex="100">
          <mat-form-field>
            <input matInput
                   placeholder="Recovery Code"
                   formControlName="code"
                   required>
            <app-control-message [control]="resetForm.controls.code"></app-control-message>
          </mat-form-field>
        </div>
        <div fxFlex="100">
            <mat-form-field>
              <input matInput
                     placeholder="Password"
                     [type]="'password'"
                     formControlName="password"
                     required>
              <app-control-message [control]="resetForm.controls.password"></app-control-message>
            </mat-form-field>
          </div>
          <div fxFlex="100">
            <mat-form-field>
              <input matInput
                     placeholder="Confirm Password"
                     [type]="'password'"
                     formControlName="confirmPassword"
                     required>
              <app-control-message [control]="resetForm.controls.confirmPassword"></app-control-message>
            </mat-form-field>
          </div>
        <div class="text-center" fxFlex="100">
         <label class="error">{{message}}</label>
        </div>

        <div fxFlex="100"
             fxLayout=""
             fxLayoutAlign="center "
             style="margin-top: 2rem">
          <button  type="button" [ngClass]="{'disabled': resetForm.invalid}"
                  class="hx-btn-primary"
                  (click)="onSubmit()">
            <a>Reset</a>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
